services:
  - type: web
    name: clauseguard-web
    runtime: docker
    repo: https://github.com/Timmydavid123/clauseguard
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: ./
    envVars:
      - key: AI_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-3-haiku-20240307
      - key: PORT
        value: 10000